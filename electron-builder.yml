appId: com.codegrab.app
productName: CodeGrab
copyright: "Copyright © 2026 CodeGrab"
asar: true
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - src/renderer/**/*
  - assets/**/*
  - "!src/**/*.ts"
  - "!**/*.map"

# ── macOS ──────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - dmg
    - zip
  darkModeSupport: true
  artifactName: "CodeGrab-${version}-mac.${ext}"
  extendInfo:
    CFBundleVersion: "2"  # Bump to force macOS icon cache refresh
    LSUIElement: true  # Hide from Dock (menubar-only app)
    NSScreenRecordingUsageDescription: "CodeGrab needs Screen Recording permission to read text from your screen."
  entitlements: null
  entitlementsInherit: null

dmg:
  title: "CodeGrab"
  iconSize: 160
  background: build/background.png
  window:
    width: 660
    height: 400
  contents:
    - x: 180
      y: 170
      type: file
    - x: 480
      y: 170
      type: link
      path: /Applications

# ── Windows ────────────────────────────────────────────────────────────────────
win:
  icon: build/icon.png
  target:
    - nsis
    - portable
  artifactName: "CodeGrab-${version}-win.${ext}"
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  deleteAppDataOnUninstall: false
  artifactName: "CodeGrab-${version}-setup.${ext}"

# ── Linux ──────────────────────────────────────────────────────────────────────
linux:
  icon: build/icon.png
  target:
    - AppImage
  category: Development
  artifactName: "CodeGrab-${version}-linux.${ext}"
